<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fg: #1a1a1a;
  --fg2: #6b6b6b;
  --fg3: #9e9e9e;
  --bg: #f8f7f5;
  --surface: #ffffff;
  --border: #e2e0dc;
  --border2: #ccc9c3;
  --accent: #3b6ff0;
  --accent-bg: #eef2fd;
  --danger: #c0392b;
  --danger-bg: #fdf0ef;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--fg);
}

.logo svg { opacity: 0.75; }

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--fg);
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  text-decoration: none;
}
.btn:hover { background: var(--bg); border-color: var(--border2); }
.btn:active { transform: scale(0.98); }
.btn svg { flex-shrink: 0; }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 500;
}
.btn-primary:hover { background: #2f5fd4; border-color: #2f5fd4; }

.btn-ghost {
  border-color: transparent;
  background: transparent;
  color: var(--fg2);
  padding: 0 8px;
}
.btn-ghost:hover { background: var(--border); color: var(--fg); }

.btn-danger {
  color: var(--danger);
  border-color: transparent;
  background: transparent;
  padding: 0 8px;
}
.btn-danger:hover { background: var(--danger-bg); border-color: transparent; }

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

/* ── Main layout ── */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ── Drop zone ── */
#drop-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--surface);
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-bg);
}
#drop-zone svg { opacity: 0.3; margin-bottom: 16px; }
#drop-zone h2 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
}
#drop-zone p {
  font-size: 13px;
  color: var(--fg2);
  margin-bottom: 20px;
}

/* ── Toolbar ── */
#toolbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}
#toolbar.visible { display: flex; }

.toolbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.toolbar-info {
  font-size: 13px;
  color: var(--fg2);
  padding: 0 4px;
}

.divider-v {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

/* ── Pages grid ── */
#pages-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

/* ── Page card ── */
.page-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: grab;
  transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s;
  user-select: none;
  position: relative;
}
.page-card:hover {
  box-shadow: var(--shadow);
  border-color: var(--border2);
}
.page-card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}
.page-card.drag-target {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-bg);
}
.page-card.selected {
  border-color: var(--accent);
}
.page-card.deleted {
  opacity: 0.35;
}

.card-check {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
  transition: background 0.12s, border-color 0.12s;
}
.page-card.selected .card-check {
  background: var(--accent);
  border-color: var(--accent);
}
.card-check svg { display: none; }
.page-card.selected .card-check svg { display: block; }

.card-thumb {
  width: 100%;
  aspect-ratio: 0.707;
  background: #f0ede8;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.card-thumb canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.card-thumb .thumb-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0ede8;
}

.card-foot {
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}

.card-meta {
  font-size: 11px;
  color: var(--fg3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.card-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.card-btn {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg3);
  transition: background 0.1s, color 0.1s;
}
.card-btn:hover { background: var(--bg); color: var(--fg); }
.card-btn.delete-btn:hover { background: var(--danger-bg); color: var(--danger); }

.deleted-badge {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  background: rgba(192,57,43,0.08);
  z-index: 1;
}
.page-card.deleted .deleted-badge { display: flex; }
.deleted-badge span {
  background: var(--danger);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
}

/* ── File source badge ── */
.file-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--fg3);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 1px 6px;
  max-width: 90px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Progress / Toast ── */
#progress-bar {
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
  z-index: 200;
  display: none;
}
#progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.2s ease;
  width: 0%;
}

#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--fg);
  color: #fff;
  font-size: 13px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  z-index: 300;
  transition: transform 0.25s ease;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Empty state ── */
#empty-state { display: none; }

/* ── File list summary ── */
#file-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}

.file-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  color: var(--fg2);
  background: var(--surface);
}
.file-chip svg { flex-shrink: 0; opacity: 0.5; }
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="toast"></div>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="9" y1="13" x2="15" y2="13"/>
      <line x1="9" y1="17" x2="12" y2="17"/>
    </svg>
    PDF Editor
  </div>
  <div class="header-actions">
    <button class="btn" id="btn-add-more" style="display:none" onclick="triggerFileInput()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      PDF 추가
    </button>
    <button class="btn btn-primary" id="btn-export" style="display:none" onclick="exportPDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      저장
    </button>
  </div>
</header>

<main>
  <!-- Drop zone -->
  <div id="drop-zone" onclick="triggerFileInput()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="9" y1="13" x2="15" y2="13"/>
      <line x1="9" y1="17" x2="12" y2="17"/>
    </svg>
    <h2>PDF 파일을 여기에 끌어다 놓으세요</h2>
    <p>또는 클릭해서 파일을 선택하세요. 여러 파일을 동시에 열 수 있습니다.</p>
    <button class="btn" onclick="event.stopPropagation(); triggerFileInput()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      파일 열기
    </button>
  </div>

  <!-- File chips -->
  <div id="file-list"></div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-info" id="toolbar-info"></span>
      <div class="divider-v"></div>
      <button class="btn btn-ghost" id="btn-select-all" onclick="toggleSelectAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9,12 11,14 15,10"/></svg>
        전체 선택
      </button>
      <button class="btn btn-ghost" id="btn-rotate-sel" onclick="rotateSelected(90)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.97"/></svg>
        회전
      </button>
      <button class="btn btn-ghost btn-danger" id="btn-delete-sel" onclick="deleteSelected()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
        삭제
      </button>
    </div>
  </div>

  <!-- Pages grid -->
  <div id="pages-grid"></div>
</main>

<input type="file" id="file-input" accept=".pdf,application/pdf" multiple style="display:none" onchange="handleFiles(this.files)" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const state = {
  pages: [],  // { id, fileIdx, pageIdx, rotation, deleted, arrayBuffer }
  files: [],  // { name, arrayBuffer }
  dragSrc: null
};

let toastTimer;

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function progress(pct) {
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  if (pct === null) { bar.style.display = 'none'; fill.style.width = '0%'; return; }
  bar.style.display = 'block';
  fill.style.width = pct + '%';
}

function triggerFileInput() {
  document.getElementById('file-input').click();
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}

function handleDragLeave(e) {
  document.getElementById('drop-zone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (files.length) loadFiles(files);
}

function handleFiles(fileList) {
  const files = [...fileList].filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (files.length) loadFiles(files);
  document.getElementById('file-input').value = '';
}

async function loadFiles(files) {
  progress(10);
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const ab = await file.arrayBuffer();
    const fileIdx = state.files.length;
    state.files.push({ name: file.name, arrayBuffer: ab });

    const pdfjsDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
    const numPages = pdfjsDoc.numPages;

    for (let p = 1; p <= numPages; p++) {
      state.pages.push({
        id: crypto.randomUUID(),
        fileIdx,
        pageIdx: p,
        rotation: 0,
        deleted: false
      });
    }
    progress(10 + 80 * (i + 1) / files.length);
  }

  progress(95);
  renderAll();
  progress(null);

  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('btn-add-more').style.display = '';
  document.getElementById('btn-export').style.display = '';
  document.getElementById('toolbar').classList.add('visible');
}

function renderAll() {
  const grid = document.getElementById('pages-grid');
  grid.innerHTML = '';

  const fileList = document.getElementById('file-list');
  fileList.innerHTML = '';
  state.files.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>${f.name}`;
    fileList.appendChild(chip);
  });

  const active = state.pages.filter(p => !p.deleted);
  document.getElementById('toolbar-info').textContent = `${state.pages.filter(p=>!p.deleted).length}페이지`;

  state.pages.forEach((page, idx) => {
    const card = createCard(page, idx);
    grid.appendChild(card);
    renderThumb(page, card.querySelector('canvas'));
  });
}

function createCard(page, idx) {
  const card = document.createElement('div');
  card.className = 'page-card' + (page.deleted ? ' deleted' : '');
  card.dataset.id = page.id;
  card.draggable = true;

  const visIdx = state.pages.filter((p, i) => !p.deleted && i <= idx).length;

  card.innerHTML = `
    <div class="card-check" onclick="toggleSelect(event,'${page.id}')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
    </div>
    <div class="card-thumb">
      <div class="thumb-loading">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      </div>
      <canvas></canvas>
    </div>
    <div class="deleted-badge"><span>삭제 예정</span></div>
    <div class="card-foot">
      <span class="card-meta">${page.deleted ? '—' : visIdx}  <span class="file-badge" style="vertical-align:middle">${state.files[page.fileIdx].name.replace(/\.pdf$/i,'').slice(0,12)}</span></span>
      <div class="card-actions">
        <button class="card-btn" title="시계 방향 90° 회전" onclick="rotatePage('${page.id}',90)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.97"/></svg>
        </button>
        <button class="card-btn delete-btn" title="${page.deleted ? '복원' : '삭제'}" onclick="toggleDelete('${page.id}')">
          ${page.deleted
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.97"/></svg>`
            : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>`
          }
        </button>
      </div>
    </div>
  `;

  card.addEventListener('dragstart', e => {
    state.dragSrc = page.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-target'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-target');
    if (state.dragSrc && state.dragSrc !== page.id) {
      const srcIdx = state.pages.findIndex(p => p.id === state.dragSrc);
      const dstIdx = state.pages.findIndex(p => p.id === page.id);
      const [moved] = state.pages.splice(srcIdx, 1);
      state.pages.splice(dstIdx, 0, moved);
      renderAll();
    }
  });

  return card;
}

async function renderThumb(page, canvas) {
  try {
    const ab = state.files[page.fileIdx].arrayBuffer;
    const pdfjsDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
    const pdfPage = await pdfjsDoc.getPage(page.pageIdx);

    const totalRot = (pdfPage.rotate + page.rotation) % 360;
    const viewport = pdfPage.getViewport({ scale: 1, rotation: totalRot });
    const scale = 300 / Math.max(viewport.width, viewport.height);
    const vp = pdfPage.getViewport({ scale, rotation: totalRot });

    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.objectFit = 'contain';

    await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

    const loading = canvas.parentNode.querySelector('.thumb-loading');
    if (loading) loading.style.display = 'none';
  } catch(e) {
    console.warn('thumb error', e);
  }
}

function toggleSelect(e, id) {
  e.stopPropagation();
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('selected');
  updateSelectionButtons();
}

function updateSelectionButtons() {
  const sel = document.querySelectorAll('.page-card.selected').length;
  document.getElementById('btn-rotate-sel').disabled = sel === 0;
  document.getElementById('btn-delete-sel').disabled = sel === 0;
}

function toggleSelectAll() {
  const cards = document.querySelectorAll('.page-card');
  const allSelected = [...cards].every(c => c.classList.contains('selected'));
  cards.forEach(c => c.classList.toggle('selected', !allSelected));
  updateSelectionButtons();
}

function rotatePage(id, deg) {
  const page = state.pages.find(p => p.id === id);
  if (!page) return;
  page.rotation = (page.rotation + deg) % 360;
  const card = document.querySelector(`[data-id="${id}"]`);
  const canvas = card.querySelector('canvas');
  canvas.style.opacity = '0.4';
  const loading = card.querySelector('.thumb-loading');
  if (loading) loading.style.display = 'flex';
  renderThumb(page, canvas).then(() => { canvas.style.opacity = '1'; });
}

function rotateSelected(deg) {
  document.querySelectorAll('.page-card.selected').forEach(card => {
    rotatePage(card.dataset.id, deg);
  });
  toast('선택한 페이지를 회전했습니다.');
}

function toggleDelete(id) {
  const page = state.pages.find(p => p.id === id);
  if (!page) return;
  page.deleted = !page.deleted;
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('deleted', page.deleted);
  const deleteBadge = card.querySelector('.deleted-badge');
  if (deleteBadge) deleteBadge.style.display = page.deleted ? 'flex' : 'none';
  const activeCount = state.pages.filter(p => !p.deleted).length;
  document.getElementById('toolbar-info').textContent = `${activeCount}페이지`;
}

function deleteSelected() {
  document.querySelectorAll('.page-card.selected').forEach(card => {
    const page = state.pages.find(p => p.id === card.dataset.id);
    if (page && !page.deleted) { page.deleted = true; toggleDelete(page.id); }
    card.classList.remove('selected');
  });
  updateSelectionButtons();
  toast('선택한 페이지를 삭제 표시했습니다.');
}

async function exportPDF() {
  const active = state.pages.filter(p => !p.deleted);
  if (!active.length) { toast('내보낼 페이지가 없습니다.'); return; }

  const btn = document.getElementById('btn-export');
  btn.disabled = true;
  btn.textContent = '처리 중…';
  progress(5);

  try {
    const { PDFDocument, degrees } = PDFLib;
    const merged = await PDFDocument.create();

    for (let i = 0; i < active.length; i++) {
      const page = active[i];
      const srcDoc = await PDFDocument.load(state.files[page.fileIdx].arrayBuffer.slice(0));
      const [copied] = await merged.copyPages(srcDoc, [page.pageIdx - 1]);
      if (page.rotation !== 0) {
        const cur = copied.getRotation().angle;
        copied.setRotation(degrees((cur + page.rotation) % 360));
      }
      merged.addPage(copied);
      progress(5 + 85 * (i + 1) / active.length);
    }

    progress(95);
    const bytes = await merged.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'merged.pdf';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast(`완료 — ${active.length}페이지 저장됨`);
  } catch(e) {
    toast('오류가 발생했습니다: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 저장`;
  progress(null);
}
</script>
